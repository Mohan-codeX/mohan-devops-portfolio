apiVersion: v1
kind: Service

metadata:
  name: {{ include "portfolio.fullname" . }}-backend
  labels:
    {{- include "portfolio.backend.labels" . | nindent 4 }}

spec:
  type: {{ .Values.backend.service.type }}

  selector:
    {{- include "portfolio.backend.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
