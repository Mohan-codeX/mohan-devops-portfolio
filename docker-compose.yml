services:
  postgres:
    image: postgres:17-alpine
    container_name: mohan-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: mohan_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mohan_portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - mohan-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: mohan-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/mohan_portfolio

    volumes:
      - ./backend/uploads:/app/uploads

    expose:
      - "8000"

    networks:
      - mohan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: mohan-frontend

    restart: unless-stopped

    depends_on:
      - backend

    expose:
      - "80"

    networks:
      - mohan-network

  reverse-proxy:
    build:
      context: ./reverse-proxy
      dockerfile: Dockerfile

    container_name: mohan-reverse-proxy

    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"

    networks:
      - mohan-network

volumes:
  postgres_data:

networks:
  mohan-network:
    driver: bridge
