apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ include "portfolio.fullname" . }}-reverse-proxy-config
  labels:
    {{- include "portfolio.reverseproxy.labels" . | nindent 4 }}

data:
  nginx.conf: |
    events {}

    http {

      upstream frontend {
        server {{ include "portfolio.fullname" . }}-frontend:{{ .Values.frontend.service.port }};
      }

      upstream backend {
        server {{ include "portfolio.fullname" . }}-backend:{{ .Values.backend.service.port }};
      }

      server {
        listen 80;
        server_name localhost;

        client_max_body_size 20M;

        location / {
          proxy_pass http://frontend;

          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
          proxy_pass http://backend/;

          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
          proxy_pass http://backend/docs;

          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
          proxy_pass http://backend/openapi.json;

          proxy_http_version 1.1;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
