apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: {{ include "portfolio.fullname" . }}-postgres
  labels:
    {{- include "portfolio.postgres.labels" . | nindent 4 }}

spec:
  serviceName: {{ include "portfolio.fullname" . }}-postgres

  replicas: 1

  selector:
    matchLabels:
      {{- include "portfolio.postgres.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "portfolio.postgres.selectorLabels" . | nindent 8 }}

    spec:
      containers:
        - name: postgres

          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}

          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.service.port }}

          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}

            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}

            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.username }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.username }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: {{ include "portfolio.fullname" . }}-postgres-pvc

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
